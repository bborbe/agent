{{- if and .Values.executor.enabled (not .Values.executor.existingSecret) }}
# Created only when no existingSecret is referenced. Quant resolves the Sentry
# DSN from teamvault and passes it via --set-string executor.sentry.dsn=...;
# a generic install sets it directly or points executor.existingSecret at a
# Secret managed outside the chart.
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: agent-task-executor
  namespace: {{ include "agent-platform.namespace" . }}
  labels:
    {{- include "agent-platform.labels" . | nindent 4 }}
data:
  sentry-dsn: {{ required "executor.sentry.dsn or executor.existingSecret is required" .Values.executor.sentry.dsn | b64enc | quote }}
{{- end }}
