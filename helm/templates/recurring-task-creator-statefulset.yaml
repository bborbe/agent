{{- if .Values.recurringTaskCreator.enabled }}
{{- $ns := include "agent.namespace" . }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: recurring-task-creator
  namespace: {{ $ns }}
  labels:
    {{- include "agent.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: recurring-task-creator
  namespace: {{ $ns }}
  labels:
    {{- include "agent.labels" . | nindent 4 }}
rules:
  - apiGroups: [task.benjamin-borbe.de]
    resources: [schedules]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: recurring-task-creator
  namespace: {{ $ns }}
  labels:
    {{- include "agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: recurring-task-creator
subjects:
  - kind: ServiceAccount
    name: recurring-task-creator
    namespace: {{ $ns }}
---
# ClusterRole is namespace-suffixed so dev + prod installs don't collide on the
# cluster-scoped object (manages the CRDs it needs to register).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: recurring-task-creator-{{ $ns }}
  labels:
    {{- include "agent.labels" . | nindent 4 }}
rules:
  - apiGroups: [apiextensions.k8s.io]
    resources: [customresourcedefinitions]
    verbs: [get, create, update, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: recurring-task-creator-{{ $ns }}
  labels:
    {{- include "agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: recurring-task-creator-{{ $ns }}
subjects:
  - kind: ServiceAccount
    name: recurring-task-creator
    namespace: {{ $ns }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: recurring-task-creator
  namespace: {{ $ns }}
  labels:
    app: recurring-task-creator
    {{- include "agent.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.keel.enabled }}
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/match-tag: "true"
    keel.sh/pollSchedule: {{ .Values.keel.pollSchedule | quote }}
    {{- end }}
    {{- with .Values.rolloutNonce }}
    random: {{ . | quote }}
    {{- end }}
spec:
  replicas: 1
  serviceName: recurring-task-creator
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: recurring-task-creator
  template:
    metadata:
      annotations:
        prometheus.io/path: /metrics
        prometheus.io/port: "9090"
        prometheus.io/scheme: http
        prometheus.io/scrape: "true"
        {{- with .Values.rolloutNonce }}
        random: {{ . | quote }}
        {{- end }}
      labels:
        app: recurring-task-creator
    spec:
      serviceAccountName: recurring-task-creator
      {{- with .Values.recurringTaskCreator.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (.Values.recurringTaskCreator.affinity | default .Values.affinity) }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: service
          image: {{ include "agent.recurringTaskCreator.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.recurringTaskCreator.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args:
            - -v={{ .Values.recurringTaskCreator.logLevel }}
          env:
            - name: LISTEN
              value: ':9090'
            - name: KAFKA_BROKERS
              value: {{ required "recurringTaskCreator.kafkaBrokers is required" .Values.recurringTaskCreator.kafkaBrokers | quote }}
            - name: STAGE
              value: {{ .Values.recurringTaskCreator.stage | quote }}
            - name: TOPIC_PREFIX
              value: {{ .Values.recurringTaskCreator.topicPrefix | quote }}
            - name: DRY_RUN
              value: {{ .Values.recurringTaskCreator.dryRun | quote }}
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.recurringTaskCreator.existingSecret | default "recurring-task-creator" }}
                  key: sentry-dsn
            {{- with .Values.recurringTaskCreator.sentry.proxy }}
            - name: SENTRY_PROXY
              value: {{ . | quote }}
            {{- end }}
            - name: TZ
              value: Europe/Berlin
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - containerPort: 9090
              name: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9090
              scheme: HTTP
            initialDelaySeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /readiness
              port: 9090
              scheme: HTTP
            initialDelaySeconds: 5
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.recurringTaskCreator.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.recurringTaskCreator.kafkaUser.enabled }}
            {{- include "agent.kafkaCertVolumeMounts" . | nindent 12 }}
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.recurringTaskCreator.kafkaUser.enabled }}
        {{- $ku := .Values.recurringTaskCreator.kafkaUser }}
        {{- $userName := $ku.userName | default (printf "%s-recurring-task-creator" (include "agent.namespace" .)) }}
        {{- include "agent.kafkaCertVolumes" (dict "clientSecret" ($ku.clientSecret | default $userName) "caCertSecret" ($ku.caCertSecret | default "my-cluster-cluster-ca-cert")) | nindent 8 }}
        {{- end }}
      {{- with (.Values.recurringTaskCreator.pullSecrets | default .Values.image.pullSecrets) }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: recurring-task-creator
  namespace: {{ $ns }}
  labels:
    app: recurring-task-creator
    {{- include "agent.labels" . | nindent 4 }}
  annotations:
    admin/port: '9090'
    admin/path: ''
spec:
  ports:
    - name: http
      port: 9090
  selector:
    app: recurring-task-creator
{{- if and (not .Values.recurringTaskCreator.existingSecret) .Values.recurringTaskCreator.sentry.dsn }}
---
# Created only when no existingSecret is referenced AND a Sentry DSN is set.
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: recurring-task-creator
  namespace: {{ $ns }}
  labels:
    {{- include "agent.labels" . | nindent 4 }}
data:
  sentry-dsn: {{ .Values.recurringTaskCreator.sentry.dsn | b64enc | quote }}
{{- end }}
{{- end }}
