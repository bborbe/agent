{{- if .Values.controller.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: agent-task-controller
  namespace: {{ include "agent.namespace" . }}
  labels:
    app: agent-task-controller
    {{- include "agent.labels" . | nindent 4 }}
  annotations:
    admin/port: '9090'
    admin/path: ''
spec:
  ports:
    - name: http
      port: 9090
  selector:
    app: agent-task-controller
{{- end }}
