{{- if .Values.executor.enabled }}
{{- $ns := include "agent-platform.namespace" . }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-task-executor
  namespace: {{ $ns }}
  labels:
    {{- include "agent-platform.labels" . | nindent 4 }}
---
# ClusterRole is namespace-suffixed so dev + prod installs don't collide on the
# cluster-scoped object (executor manages the Config CRD it consumes).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-task-executor-{{ $ns }}
  labels:
    {{- include "agent-platform.labels" . | nindent 4 }}
rules:
  - apiGroups: [apiextensions.k8s.io]
    resources: [customresourcedefinitions]
    verbs: [get, create, update, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agent-task-executor-{{ $ns }}
  labels:
    {{- include "agent-platform.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agent-task-executor-{{ $ns }}
subjects:
  - kind: ServiceAccount
    name: agent-task-executor
    namespace: {{ $ns }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-task-executor
  namespace: {{ $ns }}
  labels:
    {{- include "agent-platform.labels" . | nindent 4 }}
rules:
  - apiGroups: [batch]
    resources: [jobs]
    verbs: [create, get, list, watch, delete]
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch]
  - apiGroups: [agent.benjamin-borbe.de]
    resources: [configs]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-task-executor
  namespace: {{ $ns }}
  labels:
    {{- include "agent-platform.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: agent-task-executor
subjects:
  - kind: ServiceAccount
    name: agent-task-executor
    namespace: {{ $ns }}
{{- end }}
