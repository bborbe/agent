# Agent pushes per-agent Prometheus metrics (agent_job_run_total{status}, agent_job_last_run_timestamp_seconds{status}, agent_job_duration_seconds) to PushGateway at Job end.
# Envs (defaulted in main.go struct tags, no manifest change needed for cluster deploy):
#   PUSHGATEWAY_URL  default "http://pushgateway:9090" — cluster-internal address resolves automatically.
#   TASK_TYPE        default "unknown" — executor-side population is a follow-up; metrics carry task_type="unknown" until then.
apiVersion: agent.benjamin-borbe.de/v1
kind: Config
metadata:
  name: agent-pi
  namespace: '{{ "NAMESPACE" | env }}'
spec:
  assignee: pi-agent
  taskTypes:
    - claude
    - healthcheck
  priorityClassName: agent-pi
  image: docker.quant.benjamin-borbe.de:443/agent-pi
  heartbeat: 5m
  secretName: agent-pi
  volumeClaim: agent-pi
  volumeMountPath: /home/pi/.pi
  env:
    ALLOWED_TOOLS: Read,Bash,Grep,Glob,Write,Edit
    PROVIDER_BASE_URL: https://api.minimax.io/anthropic
    MODEL: MiniMax-M2.7-highspeed
  trigger:
    phases:
      - planning
      - in_progress
      - ai_review
    statuses:
      - in_progress
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
      ephemeral-storage: 2Gi
    limits:
      cpu: 500m
      memory: 1Gi
      ephemeral-storage: 2Gi
