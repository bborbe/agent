apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: agent-task-controller-personal
  namespace: '{{ "NAMESPACE" | env }}'
data:
  sentry-dsn: '{{ "SENTRY_DSN_KEY" | env | teamvaultUrl | base64 }}'
  gateway-secret: '{{ "OBSIDIAN_PERSONAL_GATEWAY_SECRET" | env | teamvaultPassword | base64 }}'
