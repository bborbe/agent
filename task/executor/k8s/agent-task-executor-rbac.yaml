apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-task-executor
  namespace: '{{ "NAMESPACE" | env }}'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-task-executor
  namespace: '{{ "NAMESPACE" | env }}'
rules:
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - create
      - get
      - list
      - watch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-task-executor
  namespace: '{{ "NAMESPACE" | env }}'
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: agent-task-executor
subjects:
  - kind: ServiceAccount
    name: agent-task-executor
    namespace: '{{ "NAMESPACE" | env }}'
