apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: agent-task-controller
  namespace: '{{ "NAMESPACE" | env }}'
data:
  sentry-dsn: '{{ "SENTRY_DSN_KEY" | env | teamvaultUrl | base64 }}'
  git-ssh-key: '{{ "GIT_SSH_KEY" | env | teamvaultFile | base64 }}'
  gemini-api-key: '{{ "GEMINI_API_KEY_KEY" | env | teamvaultPassword | base64 }}'
